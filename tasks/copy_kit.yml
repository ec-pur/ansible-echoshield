---
- name: Ensure remote kit dir exists
  ansible.builtin.file:
    path: "{{ echoshield_kit_remote_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Upload Deployment Kit
  ansible.builtin.copy:
    src: "{{ echoshield_kit_local_path }}/"
    dest: "{{ echoshield_kit_remote_path }}/"
    owner: root
    group: root
    directory_mode: "0755"
    mode: "0644"
    # v0.1: full copy per run (~50 MB upload per Pi at install time is
    # acceptable for the BYO flow — install is a one-shot operation, not a
    # recurring sync). Prior implementation used ansible.posix.synchronize
    # with become: false, but rsync ran as the unprivileged user against a
    # root-owned dest dir created by the preceding file task and failed with
    # Permission denied. Wrapping rsync via --rsync-path="sudo rsync"
    # provoked "sudo: unrecognized option --server" because sudo claimed the
    # server flag. Switching to copy is the simplest correct fix. v0.2 may
    # restore incremental delta transfer via a role-shipped rsync_wrapper.sh
    # once the BYO install scale (>10 Pis per operator run) makes the
    # bandwidth saving worth the wrapper complexity.

- name: Ensure install-pi.sh is executable on the Pi
  ansible.builtin.file:
    path: "{{ echoshield_kit_remote_path }}/install-pi.sh"
    mode: "0755"
    owner: root
    group: root

- name: Confirm install-common.sh is present
  ansible.builtin.stat:
    path: "{{ echoshield_kit_remote_path }}/install-common.sh"
  register: _common_stat
  failed_when: not _common_stat.stat.exists
